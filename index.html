<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================================= -->
    <!-- LOADER -->
    <!-- ========================================= -->

    <div id="loader">

        <div class="loader-logo">

            🕷️

        </div>

        <h2>Loading Your Small Surprise...</h2>

    </div>

    <!-- ========================================= -->
    <!-- BACKGROUND -->
    <!-- ========================================= -->

    <div class="background"></div>

    <div class="overlay"></div>

    <!-- Spider Web -->

    <img src="assets/spiderman-bg.jpg" class="web-left">

    <img src="assets/web.png" class="web-right">

    <!-- Falling Flowers -->

    <div id="flower-container"></div>

    <!-- Floating Particles -->

    <div id="particles"></div>

    <!-- Cursor Glow -->

    <div class="cursor-glow"></div>

    <!-- ========================================= -->
    <!-- HERO -->
    <!-- ========================================= -->

    <section class="hero">

        <div class="hero-content">

            <span class="subtitle">

                FOR MY FAVORITE PERSON

            </span>

            <h1>

                Happy Birthday

            </h1>

            <h2>

                My Pwetty Girl ❤️

            </h2>

            <p class="description">

                just a little reminder... 
                you're loved, 
                appreciated, 
                and so, so special.<br>

                enjoy your day, pretty.
            </p>

            <button id="openGift">

                OPEN YOUR GIFT

            </button>

        </div>

    </section>

    <!-- ========================================= -->
    <!-- LOVE LETTER -->
    <!-- ========================================= -->

    <section class="letter-section">

        <div class="letter-card">


<span class="letter-title">
💌 LOVE LETTER
</span>

<div class="letter-content">

<img 
src="assets/photo3.jpeg"
class="letter-photo">


<p id="typingText"></p>

</div>
</div>
  
    </section>

  

    <!-- ========================================= -->
    <!-- ENDING -->
    <!-- ========================================= -->

    <section class="ending">

        <div id="strawberry-container"></div>
        
        <h1>

            I Love Youu 5000 ❤️

        </h1>

        <p>

         wlewlewlewlewlewle

        </p>

        <h3>

            and i'll never get tired of saying it.
        </h3>

    </section>

    <!-- ========================================= -->
    <!-- MUSIC -->
    <!-- ========================================= -->

    <audio id="music" loop>

        <source src="assets/music.mp3" type="audio/mpeg">

    </audio>

<button id="musicButton">
🎵
</button>
    <!-- ========================================= -->
    <!-- JAVASCRIPT -->
    <!-- ========================================= -->

    <script src="script.js"></script>


    
</body>

</html>
